services:

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: vibekit
      POSTGRES_PASSWORD: vibekit123
      POSTGRES_DB: vibekit
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - vibekit-network

  backend:
    build: ./backend
    ports:
      - "8888:8888"
    environment:
      DATABASE_URL: postgresql://vibekit:vibekit123@db:5432/vibekit
      JWT_SECRET: docker-local-secret-change-me-in-prod
      NODE_ENV: development
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - db
    networks:
      - vibekit-network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8888
    depends_on:
      - backend
    networks:
      - vibekit-network

volumes:
  pgdata:

networks:
  vibekit-network:
    driver: bridge